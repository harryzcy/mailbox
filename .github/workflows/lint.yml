name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main

  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main

  spelling:
    name: Spelling
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@f9c37e2c1e7c00d5ed2e322fd7f3da9f14d5d172 # main
